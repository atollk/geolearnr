minimum_prek_version = "0.1.0"

# Ruff – linting + formatting
[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff"
name = "ruff"
entry = "uv run ruff check"
args = ["--fix"]
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "uv run ruff format"
language = "system"
types = ["python"]

# Pyrefly – type checking
[[repos]]
repo = "local"

[[repos.hooks]]
id = "pyrefly-check"
name = "pyrefly check"
entry = "uv run pyrefly check"
language = "system"
pass_filenames = false

# Built-in prek hooks (fast, no extra env)
[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-merge-conflict"
