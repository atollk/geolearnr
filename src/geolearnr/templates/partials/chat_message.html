<div class="chat chat-end mb-2">
  <div class="chat-bubble chat-bubble-primary">{{ message }}</div>
</div>
<div id="response-{{ id }}" class="chat chat-start mb-2">
  <div class="chat-bubble"
    hx-ext="sse"
    sse-connect="{{ sse_url }}"
    sse-swap="token"
    hx-swap="beforeend"
    sse-close="done"
  ></div>
</div>
