<div id="config-result"></div>

<form
        hx-post="/api/config"
        hx-target="#config-result"
        hx-swap="innerHTML"
        hx-ext="json-enc"
>
    <div class="form-control mb-3">
        <label class="label" for="provider"><span class="label-text">Provider</span></label>
        <select
                id="provider"
                name="provider"
                class="select select-bordered"
                hx-get="/api/models"
                hx-target="#model-select"
                hx-swap="innerHTML"
                hx-trigger="change"
                hx-include="[name='provider'],[name='api_key']"
                hx-indicator="#models-spinner"
        >
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google</option>
        </select>
    </div>

    <div class="form-control mb-3">
        <label class="label" for="api-key"><span class="label-text">API Key</span></label>
        <input
                id="api-key"
                type="password"
                name="api_key"
                class="input input-bordered"
                placeholder="Your API key"
                required
                hx-get="/api/models"
                hx-target="#model-select"
                hx-swap="innerHTML"
                hx-trigger="change"
                hx-include="[name='provider'],[name='api_key']"
                hx-indicator="#models-spinner"
        />
    </div>

    <div class="form-control mb-4">
        <label class="label" for="model-select">
            <span class="label-text">Model</span>
            <span id="models-spinner" class="htmx-indicator loading loading-spinner loading-xs"></span>
        </label>
        <select name="model" id="model-select" class="select select-bordered">
            <option value="" disabled selected>Enter API key to load models…</option>
        </select>
    </div>

    <div class="form-control mb-4">
        <label class="label" for="maps-api-key">
            <span class="label-text">Google Maps API Key <span class="text-base-content/50">(optional)</span></span>
        </label>
        <input
                id="maps-api-key"
                type="password"
                name="maps_api_key"
                class="input input-bordered"
                placeholder="For high-quality panoramas via official API"
        />
        <label class="label">
            <span class="label-text-alt text-base-content/50">If omitted, panoramas are fetched by scraping (may be unreliable)</span>
        </label>
    </div>

    <button type="submit" class="btn btn-primary w-full">Save &amp; Continue</button>
</form>
