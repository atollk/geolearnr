<script>
  window.dispatchEvent(new CustomEvent('compare-done'));
</script>
<div x-data>
  <div class="prose max-w-none mb-6">
    <h3>Analysis</h3>
    {{ analysis | safe }}
  </div>

  <div class="divider">Chat</div>

  <div id="chat-messages" class="flex flex-col gap-3 mb-4 min-h-24 max-h-96 overflow-y-auto">
  </div>

  <form
    @submit.prevent="
      const msg = $el.querySelector('[name=message]').value.trim();
      if (!msg) return;
      const context = `{{ context | e }}`;
      const url = '/api/chat?message=' + encodeURIComponent(msg) + '&context=' + encodeURIComponent(context);
      $dispatch('send-chat', { url, message: msg });
      $el.querySelector('[name=message]').value = '';
    "
    class="flex gap-2"
  >
    <input
      name="message"
      type="text"
      class="input input-bordered flex-1"
      placeholder="Ask a follow-up question…"
      autocomplete="off"
    />
    <button type="submit" class="btn btn-primary">Send</button>
  </form>

  <div>
    All textual content (i.e., not program code or images) is published under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a>.
    The original content is attributed to www.plonkit.com .
  </div>
</div>
